<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" fill="black"/>
  
  <defs>
    <!-- Mask to create the clean 'Interwoven Gap' -->
    <mask id="lineGap">
      <rect width="100" height="100" fill="white"/>
      <!-- This circle sits on the intersection and 'erases' the line underneath -->
      <!-- We tilt it slightly to follow the angle of the top stroke -->
      <path d="M42 42 L 58 58" stroke="black" stroke-width="8" stroke-linecap="round"/>
    </mask>
  </defs>

  <!-- The Under-pass Loop (Full loop minus the intersection gap) -->
  <path d="M50 50 C 70 70, 85 85, 50 85 C 15 85, 30 70, 50 50 C 70 30, 85 15, 50 15 C 15 15, 30 30, 50 50" 
        stroke="white" stroke-width="4" stroke-linecap="round" fill="none" mask="url(#lineGap)"/>

  <!-- The Over-pass Segment (Cleanly crosses over the gap) -->
  <path d="M44 44 C 47 47, 53 53, 56 56" 
        stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
</svg>
